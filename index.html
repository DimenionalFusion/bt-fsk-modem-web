<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESP32 BT Modem</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
    background: #1a1a2e; color: #e0e0e0; height: 100dvh;
    display: flex; flex-direction: column;
  }
  #header {
    background: #16213e; padding: 12px 16px;
    border-bottom: 1px solid #0f3460;
    display: flex; align-items: center; gap: 10px;
  }
  #status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555; flex-shrink: 0; transition: background 0.3s;
  }
  #status-dot.connecting { background: #f39c12; }
  #status-dot.connected  { background: #2ecc71; }
  #status-dot.error      { background: #e74c3c; }
  #status-text { font-size: 14px; color: #aaa; flex: 1; }
  #connect-btn {
    background: #0f3460; border: 1px solid #e94560;
    color: #e94560; padding: 6px 14px; border-radius: 6px;
    font-size: 13px; cursor: pointer;
  }
  #connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .msg {
    max-width: 80%; padding: 8px 12px; border-radius: 12px;
    font-size: 15px; line-height: 1.4; word-break: break-word;
  }
  .msg.esp32 { background: #0f3460; align-self: flex-start; border-bottom-left-radius: 3px; }
  .msg.me    { background: #e94560; align-self: flex-end;   border-bottom-right-radius: 3px; }
  .msg.sys   { background: #222; align-self: center; color: #888; font-size: 12px; max-width: 90%; }
  #input-row {
    display: flex; gap: 8px; padding: 10px 12px;
    background: #16213e; border-top: 1px solid #0f3460;
  }
  #msg-input {
    flex: 1; background: #0d1b2a; border: 1px solid #0f3460;
    color: #e0e0e0; padding: 10px 12px; border-radius: 8px;
    font-size: 15px; outline: none;
  }
  #msg-input:focus { border-color: #e94560; }
  #send-btn {
    background: #e94560; border: none; color: #fff;
    padding: 10px 18px; border-radius: 8px; font-size: 15px; cursor: pointer;
  }
  #send-btn:disabled { background: #555; cursor: not-allowed; }
  #dbg { font-size: 10px; color: #444; padding: 2px 12px; background: #111; min-height: 18px; font-family: monospace; }
</style>
</head>
<body>

<div id="header">
  <div id="status-dot"></div>
  <span id="status-text">Tap Connect to start</span>
  <button id="connect-btn">Connect</button>
</div>

<div id="messages">
  <div class="msg sys">
    1. Pair your phone to <b>ESP32-Modem</b> in Bluetooth settings<br>
    2. Tap Connect and allow microphone<br>
    3. Audio will route through Bluetooth
  </div>
</div>

<div id="dbg"></div>

<div id="input-row">
  <input id="msg-input" type="text" placeholder="Type a message…" disabled
         maxlength="240" autocomplete="off" autocorrect="off" spellcheck="false">
  <button id="send-btn" disabled>Send</button>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
 * FSK AudioWorklet — runs in audio thread
 * 300 baud, 1200 Hz mark, 2200 Hz space
 * Frame: [0xAA×3][0x7E][LEN][DATA][CRC8][0x7E]
 * ════════════════════════════════════════════════════════════════════════ */
const WORKLET_CODE = `
const BAUD_RATE  = 300;
const MARK_FREQ  = 1200;
const SPACE_FREQ = 2200;
const PREAMBLE   = 0xAA;
const FRAME_FLAG = 0x7E;
const AMPLITUDE  = 0.55;

function crc8(data) {
  let crc = 0xFF;
  for (const b of data) {
    crc ^= b;
    for (let i = 0; i < 8; i++)
      crc = (crc & 0x80) ? ((crc << 1) ^ 0x07) & 0xFF : (crc << 1) & 0xFF;
  }
  return crc;
}

class Goertzel {
  constructor(freq, sr, N) {
    this.coeff = 2 * Math.cos(2 * Math.PI * freq / sr);
    this.N = N; this.q1 = this.q2 = this.count = 0;
  }
  add(s) {
    const q0 = this.coeff * this.q1 - this.q2 + s;
    this.q2 = this.q1; this.q1 = q0;
    if (++this.count < this.N) return -1;
    const m = this.q1*this.q1 + this.q2*this.q2 - this.q1*this.q2*this.coeff;
    this.q1 = this.q2 = this.count = 0;
    return m;
  }
}

class UartRx {
  constructor() { this.state = 0; this.byte = 0; this.ready = this.err = false; }
  reset()       { this.state = 0; this.byte = 0; this.ready = this.err = false; }
  feed(bit) {
    this.ready = this.err = false;
    if (this.state === 0) { if (bit === 0) { this.state = 1; this.byte = 0; } }
    else if (this.state <= 8) { this.byte |= (bit << (this.state - 1)); this.state++; }
    else { this.state = 0; if (bit === 1) this.ready = true; else this.err = true; }
  }
}

class FSKProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    const sr  = sampleRate;
    const N   = Math.round(sr / BAUD_RATE);
    this.gMark  = new Goertzel(MARK_FREQ,  sr, N);
    this.gSpace = new Goertzel(SPACE_FREQ, sr, N);
    this.uart   = new UartRx();

    /* RX state */
    this.rxTop   = 'HUNT';
    this.rxFrame = 'START';
    this.consecMark = 0; this.preambleCnt = 0;
    this.msgBuf = []; this.msgLen = 0; this.msgCrc = 0;

    /* TX state */
    this.txBits  = [];
    this.txPhase = 0;
    this.txLeft  = 0;
    this.txBit   = 1;  /* idle = mark */
    this.txPhaseIncMark  = 2 * Math.PI * MARK_FREQ  / sr;
    this.txPhaseIncSpace = 2 * Math.PI * SPACE_FREQ / sr;
    this.samplesPerBit   = sr / BAUD_RATE;

    this.port.onmessage = e => { if (e.data.type === 'send') this._encode(e.data.text); };
  }

  _pushBit(b) { this.txBits.push(b); }
  _pushByte(byte) {
    this._pushBit(0);
    for (let i = 0; i < 8; i++) this._pushBit((byte >> i) & 1);
    this._pushBit(1);
  }
  _encode(text) {
    const data = new TextEncoder().encode(text.slice(0, 240));
    for (let i = 0; i < 20; i++) this._pushBit(1);
    for (let i = 0; i < 3; i++) this._pushByte(PREAMBLE);
    this._pushByte(FRAME_FLAG);
    this._pushByte(data.length);
    for (const b of data) this._pushByte(b);
    this._pushByte(crc8(data));
    this._pushByte(FRAME_FLAG);
    for (let i = 0; i < 20; i++) this._pushBit(1);
  }

  _rxBit(bit) {
    switch (this.rxTop) {
    case 'HUNT':
      this.consecMark = bit ? this.consecMark + 1 : 0;
      if (this.consecMark >= 15) {
        this.rxTop = 'PREAMBLE'; this.preambleCnt = 0; this.consecMark = 0; this.uart.reset();
      }
      break;
    case 'PREAMBLE':
      this.uart.feed(bit);
      if (this.uart.err) { this.rxTop = 'HUNT'; this.preambleCnt = 0; this.uart.reset(); break; }
      if (!this.uart.ready) break;
      if (this.uart.byte === PREAMBLE) {
        if (++this.preambleCnt >= 3) { this.rxTop = 'FRAME'; this.rxFrame = 'START'; this.msgBuf = []; this.uart.reset(); }
      } else if (this.uart.byte === FRAME_FLAG && this.preambleCnt >= 1) {
        this.rxTop = 'FRAME'; this.rxFrame = 'LEN'; this.msgBuf = []; this.uart.reset();
      } else if (this.uart.byte !== PREAMBLE) {
        this.rxTop = 'HUNT'; this.preambleCnt = 0; this.uart.reset();
      }
      break;
    case 'FRAME':
      this.uart.feed(bit);
      if (this.uart.err) { this.rxTop = 'HUNT'; this.uart.reset(); break; }
      if (!this.uart.ready) break;
      const b = this.uart.byte; this.uart.reset();
      switch (this.rxFrame) {
      case 'START': if (b === FRAME_FLAG) { this.rxFrame = 'LEN'; this.msgBuf = []; } else this.rxTop = 'HUNT'; break;
      case 'LEN':   this.msgLen = b; this.rxFrame = b > 0 ? 'DATA' : 'CRC'; break;
      case 'DATA':  this.msgBuf.push(b); if (this.msgBuf.length >= this.msgLen) this.rxFrame = 'CRC'; break;
      case 'CRC':   this.msgCrc = b; this.rxFrame = 'END'; break;
      case 'END':
        if (b === FRAME_FLAG && crc8(this.msgBuf) === this.msgCrc)
          this.port.postMessage({ type: 'recv', text: new TextDecoder().decode(new Uint8Array(this.msgBuf)) });
        else if (b === FRAME_FLAG)
          this.port.postMessage({ type: 'crcerr' });
        this.rxTop = 'HUNT';
        break;
      }
      break;
    }
  }

  process(inputs, outputs) {
    const inp = inputs[0]?.[0];
    const out = outputs[0]?.[0];

    /* RX: decode incoming audio from ESP32 */
    if (inp) {
      for (let i = 0; i < inp.length; i++) {
        const em = this.gMark.add(inp[i]);
        const es = this.gSpace.add(inp[i]);
        if (em >= 0 && es >= 0) {
          const total = em + es;
          if (total < 0.0002) { this.rxTop = 'HUNT'; this.consecMark = 0; this.preambleCnt = 0; this.uart.reset(); }
          else this._rxBit(em >= es ? 1 : 0);
        }
      }
    }

    /* TX: generate outgoing FSK to send to ESP32 */
    if (out) {
      for (let i = 0; i < out.length; i++) {
        if (this.txLeft <= 0) {
          this.txBit  = this.txBits.length > 0 ? this.txBits.shift() : 1;
          this.txLeft += this.samplesPerBit;
        }
        const inc = this.txBit ? this.txPhaseIncMark : this.txPhaseIncSpace;
        out[i]       = AMPLITUDE * Math.sin(this.txPhase);
        this.txPhase = (this.txPhase + inc) % (2 * Math.PI);
        this.txLeft -= 1;
      }
    }
    return true;
  }
}
registerProcessor('fsk-processor', FSKProcessor);
`;

/* ════════════════════════════════════════════════════════════════════════
 * Main App
 * Key trick for Android: wrap audio in RTCPeerConnection.
 * Chrome switches to AudioManager.MODE_IN_COMMUNICATION when WebRTC is
 * active, which routes BOTH mic and speaker through BT HFP SCO instead
 * of the phone's speakers. This is how Meet/WhatsApp Web use BT headsets.
 * ════════════════════════════════════════════════════════════════════════ */
const connectBtn = document.getElementById('connect-btn');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const messages   = document.getElementById('messages');
const msgInput   = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const dbg        = document.getElementById('dbg');

let audioCtx = null, fskNode = null, localPc = null, remotePc = null;
let connected = false;

function setStatus(cls, txt) { statusDot.className = cls; statusText.textContent = txt; }
function setDebug(t) { dbg.textContent = t; }
function addMsg(cls, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls; d.textContent = text;
  messages.appendChild(d); messages.scrollTop = messages.scrollHeight;
}

async function connect() {
  connectBtn.disabled = true;
  setStatus('connecting', 'Requesting microphone…');

  try {
    /* 1. Get mic — in MODE_IN_COMMUNICATION this will be BT SCO (ESP32 mic output) */
    const micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      }
    });

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    /* 2. Load FSK worklet */
    const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
    const url  = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);

    fskNode = new AudioWorkletNode(audioCtx, 'fsk-processor', {
      numberOfInputs: 1, numberOfOutputs: 1, outputChannelCount: [1],
    });

    /* 3. Mic → FSK input (decode what ESP32 sends us via BT SCO) */
    audioCtx.createMediaStreamSource(micStream).connect(fskNode);

    /* 4. FSK output → MediaStreamDestination (to feed into WebRTC) */
    const outDest = audioCtx.createMediaStreamDestination();
    fskNode.connect(outDest);

    /* 5. WebRTC loopback — forces Android into MODE_IN_COMMUNICATION
     *    so both mic AND speaker route through BT HFP SCO              */
    localPc  = new RTCPeerConnection();
    remotePc = new RTCPeerConnection();

    outDest.stream.getTracks().forEach(t => localPc.addTrack(t, outDest.stream));

    localPc.onicecandidate  = e => e.candidate && remotePc.addIceCandidate(e.candidate);
    remotePc.onicecandidate = e => e.candidate && localPc.addIceCandidate(e.candidate);

    const offer = await localPc.createOffer();
    await localPc.setLocalDescription(offer);
    await remotePc.setRemoteDescription(offer);
    const answer = await remotePc.createAnswer();
    await remotePc.setLocalDescription(answer);
    await localPc.setRemoteDescription(answer);

    /* 6. Play remote audio — Chrome routes this through the call path → BT SCO → ESP32 */
    remotePc.ontrack = ({ streams: [s] }) => {
      const audio = document.createElement('audio');
      audio.srcObject = s;
      audio.volume = 1.0;
      document.body.appendChild(audio);
      audio.play().catch(() => {});
    };

    /* 7. Handle decoded messages from ESP32 */
    fskNode.port.onmessage = e => {
      if (e.data.type === 'recv') { addMsg('esp32', e.data.text); setDebug('Message received'); }
      else if (e.data.type === 'crcerr') setDebug('CRC error — frame dropped');
    };

    connected = true;
    setStatus('connected', 'Connected via Bluetooth SCO');
    addMsg('sys', 'Audio routed through Bluetooth. Type a message below.');
    msgInput.disabled = false;
    sendBtn.disabled  = false;
    msgInput.focus();
    connectBtn.textContent = 'Disconnect';
    connectBtn.disabled    = false;
    connectBtn.onclick     = disconnect;

  } catch (err) {
    setStatus('error', err.message);
    addMsg('sys', 'Error: ' + err.message);
    connectBtn.disabled = false;
  }
}

function disconnect() {
  localPc?.close(); remotePc?.close();
  audioCtx?.close();
  audioCtx = fskNode = localPc = remotePc = null;
  connected = false;
  setStatus('', 'Disconnected');
  msgInput.disabled = true; sendBtn.disabled = true;
  connectBtn.textContent = 'Connect'; connectBtn.onclick = connect;
  connectBtn.disabled = false;
}

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !connected || !fskNode) return;
  fskNode.port.postMessage({ type: 'send', text });
  addMsg('me', text);
  msgInput.value = '';
}

connectBtn.onclick = connect;
sendBtn.onclick    = sendMessage;
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

if (location.protocol !== 'https:' && location.hostname !== 'localhost')
  addMsg('sys', 'WARNING: Microphone requires HTTPS.');
</script>
</body>
</html>
