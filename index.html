<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESP32 BT Modem</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
    background: #1a1a2e; color: #e0e0e0; height: 100dvh;
    display: flex; flex-direction: column;
  }
  #header {
    background: #16213e; padding: 12px 16px;
    border-bottom: 1px solid #0f3460;
    display: flex; align-items: center; gap: 10px;
  }
  #status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555; flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.connecting { background: #f39c12; }
  #status-dot.connected  { background: #2ecc71; }
  #status-dot.error      { background: #e74c3c; }
  #status-text { font-size: 14px; color: #aaa; flex: 1; }
  #connect-btn {
    background: #0f3460; border: 1px solid #e94560;
    color: #e94560; padding: 6px 14px; border-radius: 6px;
    font-size: 13px; cursor: pointer;
  }
  #connect-btn:active { background: #e94560; color: #fff; }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .msg {
    max-width: 80%; padding: 8px 12px; border-radius: 12px;
    font-size: 15px; line-height: 1.4; word-break: break-word;
  }
  .msg.esp32 {
    background: #0f3460; align-self: flex-start;
    border-bottom-left-radius: 3px;
  }
  .msg.me {
    background: #e94560; align-self: flex-end;
    border-bottom-right-radius: 3px;
  }
  .msg.sys {
    background: #222; align-self: center;
    color: #888; font-size: 12px; max-width: 90%;
  }
  #input-row {
    display: flex; gap: 8px; padding: 10px 12px;
    background: #16213e; border-top: 1px solid #0f3460;
  }
  #msg-input {
    flex: 1; background: #0d1b2a; border: 1px solid #0f3460;
    color: #e0e0e0; padding: 10px 12px; border-radius: 8px;
    font-size: 15px; outline: none;
  }
  #msg-input:focus { border-color: #e94560; }
  #send-btn {
    background: #e94560; border: none; color: #fff;
    padding: 10px 18px; border-radius: 8px; font-size: 15px; cursor: pointer;
  }
  #send-btn:disabled { background: #555; cursor: not-allowed; }
  #dbg {
    font-size: 10px; color: #444; padding: 2px 12px;
    background: #111; min-height: 18px; font-family: monospace;
  }
</style>
</head>
<body>

<div id="header">
  <div id="status-dot"></div>
  <span id="status-text">Tap Connect to start</span>
  <button id="connect-btn">Connect</button>
</div>

<div id="messages">
  <div class="msg sys">Connect the ESP32 via iPhone Bluetooth first,<br>
  then tap Connect here to open the audio channel.</div>
</div>

<div id="dbg"></div>

<div id="input-row">
  <input id="msg-input" type="text" placeholder="Type a message…" disabled
         maxlength="240" autocomplete="off" autocorrect="off" spellcheck="false">
  <button id="send-btn" disabled>Send</button>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
 * FSK Modem — AudioWorklet code (runs in audio thread)
 * Protocol matches firmware exactly:
 *   300 baud, 1200 Hz mark (1), 2200 Hz space (0)
 *   Frame: [0xAA x3] [0x7E] [LEN] [DATA] [CRC8] [0x7E]
 * ════════════════════════════════════════════════════════════════════════ */
const WORKLET_CODE = `
const BAUD_RATE    = 300;
const MARK_FREQ    = 1200;
const SPACE_FREQ   = 2200;
const PREAMBLE     = 0xAA;
const FRAME_FLAG   = 0x7E;
const AMPLITUDE    = 0.6;

function crc8(data) {
  let crc = 0xFF;
  for (const b of data) {
    crc ^= b;
    for (let i = 0; i < 8; i++)
      crc = (crc & 0x80) ? ((crc << 1) ^ 0x07) & 0xFF : (crc << 1) & 0xFF;
  }
  return crc;
}

/* ── RX: dual Goertzel filter ─────────────────────────────────────────── */
class Goertzel {
  constructor(freq, sampleRate, blockSize) {
    this.coeff = 2 * Math.cos(2 * Math.PI * freq / sampleRate);
    this.N = blockSize;
    this.q1 = this.q2 = this.count = 0;
  }
  add(s) {
    const q0 = this.coeff * this.q1 - this.q2 + s;
    this.q2 = this.q1; this.q1 = q0;
    if (++this.count < this.N) return -1;
    const mag = this.q1*this.q1 + this.q2*this.q2 - this.q1*this.q2*this.coeff;
    this.q1 = this.q2 = this.count = 0;
    return mag;
  }
}

/* ── UART-style bit receiver ──────────────────────────────────────────── */
class UartRx {
  constructor() { this.state = 0; this.byte = 0; this.ready = false; this.err = false; }
  reset()       { this.state = 0; this.byte = 0; this.ready = false; this.err = false; }
  feed(bit) {
    this.ready = false; this.err = false;
    if (this.state === 0) {
      if (bit === 0) { this.state = 1; this.byte = 0; }
    } else if (this.state <= 8) {
      this.byte |= (bit << (this.state - 1));
      this.state++;
    } else {
      this.state = 0;
      if (bit === 1) this.ready = true; else this.err = true;
    }
  }
}

class FSKProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    const sr = sampleRate;
    const blockSize = Math.round(sr / BAUD_RATE);
    this.gMark  = new Goertzel(MARK_FREQ,  sr, blockSize);
    this.gSpace = new Goertzel(SPACE_FREQ, sr, blockSize);
    this.uart   = new UartRx();

    /* RX state machine */
    this.rxTop    = 'HUNT';   /* HUNT | PREAMBLE | FRAME */
    this.rxFrame  = 'START';  /* START | LEN | DATA | CRC | END */
    this.consecMark     = 0;
    this.preambleCount  = 0;
    this.msgBuf   = [];
    this.msgLen   = 0;
    this.msgCrc   = 0;

    /* TX state */
    this.txBits   = [];        /* bit queue */
    this.txPhase  = 0;
    this.txSamplesLeft = 0;
    this.txCurrentBit  = 1;   /* idle = mark */
    this.txPhaseIncMark  = 2 * Math.PI * MARK_FREQ  / sr;
    this.txPhaseIncSpace = 2 * Math.PI * SPACE_FREQ / sr;
    this.samplesPerBit   = sr / BAUD_RATE;

    this.port.onmessage = (e) => {
      if (e.data.type === 'send') this._encodeSend(e.data.text);
    };
  }

  _pushBit(b) { this.txBits.push(b); }
  _pushByte(byte) {
    this._pushBit(0); /* start */
    for (let i = 0; i < 8; i++) this._pushBit((byte >> i) & 1);
    this._pushBit(1); /* stop */
  }
  _encodeSend(text) {
    const enc = new TextEncoder();
    const data = enc.encode(text.slice(0, 240));
    for (let i = 0; i < 20; i++) this._pushBit(1); /* idle prefix */
    for (let i = 0; i < 3; i++) this._pushByte(PREAMBLE);
    this._pushByte(FRAME_FLAG);
    this._pushByte(data.length);
    for (const b of data) this._pushByte(b);
    this._pushByte(crc8(data));
    this._pushByte(FRAME_FLAG);
    for (let i = 0; i < 20; i++) this._pushBit(1); /* idle suffix */
  }

  _rxBit(bit) {
    switch (this.rxTop) {
    case 'HUNT':
      this.consecMark = bit ? this.consecMark + 1 : 0;
      if (this.consecMark >= 15) {
        this.rxTop = 'PREAMBLE'; this.preambleCount = 0;
        this.consecMark = 0; this.uart.reset();
      }
      break;
    case 'PREAMBLE':
      this.uart.feed(bit);
      if (this.uart.err) { this.rxTop = 'HUNT'; this.preambleCount = 0; this.uart.reset(); break; }
      if (!this.uart.ready) break;
      if (this.uart.byte === PREAMBLE) {
        if (++this.preambleCount >= 3) {
          this.rxTop = 'FRAME'; this.rxFrame = 'START'; this.msgBuf = []; this.uart.reset();
        }
      } else if (this.uart.byte === FRAME_FLAG && this.preambleCount >= 1) {
        this.rxTop = 'FRAME'; this.rxFrame = 'LEN'; this.msgBuf = []; this.uart.reset();
      } else {
        this.rxTop = 'HUNT'; this.preambleCount = 0; this.uart.reset();
      }
      break;
    case 'FRAME':
      this.uart.feed(bit);
      if (this.uart.err) { this.rxTop = 'HUNT'; this.uart.reset(); break; }
      if (!this.uart.ready) break;
      const b = this.uart.byte; this.uart.reset();
      switch (this.rxFrame) {
      case 'START':
        if (b === FRAME_FLAG) { this.rxFrame = 'LEN'; this.msgBuf = []; }
        else this.rxTop = 'HUNT';
        break;
      case 'LEN':
        this.msgLen = b;
        this.rxFrame = b > 0 ? 'DATA' : 'CRC';
        break;
      case 'DATA':
        this.msgBuf.push(b);
        if (this.msgBuf.length >= this.msgLen) this.rxFrame = 'CRC';
        break;
      case 'CRC':
        this.msgCrc = b; this.rxFrame = 'END';
        break;
      case 'END':
        if (b === FRAME_FLAG) {
          const calc = crc8(this.msgBuf);
          if (calc === this.msgCrc) {
            const text = new TextDecoder().decode(new Uint8Array(this.msgBuf));
            this.port.postMessage({ type: 'recv', text });
          } else {
            this.port.postMessage({ type: 'crcerr' });
          }
        }
        this.rxTop = 'HUNT';
        break;
      }
      break;
    }
  }

  process(inputs, outputs) {
    /* RX: analyze input channel 0 */
    const inputChannel = inputs[0] && inputs[0][0];
    if (inputChannel) {
      for (let i = 0; i < inputChannel.length; i++) {
        const em = this.gMark.add(inputChannel[i]);
        const es = this.gSpace.add(inputChannel[i]);
        if (em >= 0 && es >= 0) { /* both blocks complete simultaneously */
          const total = em + es;
          if (total < 0.0002) { /* silence */
            this.rxTop = 'HUNT'; this.consecMark = 0;
            this.preambleCount = 0; this.uart.reset();
          } else {
            this._rxBit(em >= es ? 1 : 0);
          }
        }
      }
    }

    /* TX: generate output on channel 0 */
    const outputChannel = outputs[0] && outputs[0][0];
    if (outputChannel) {
      for (let i = 0; i < outputChannel.length; i++) {
        if (this.txSamplesLeft <= 0) {
          this.txCurrentBit = this.txBits.length > 0 ? this.txBits.shift() : 1;
          this.txSamplesLeft += this.samplesPerBit;
        }
        const inc = this.txCurrentBit ? this.txPhaseIncMark : this.txPhaseIncSpace;
        outputChannel[i] = AMPLITUDE * Math.sin(this.txPhase);
        this.txPhase = (this.txPhase + inc) % (2 * Math.PI);
        this.txSamplesLeft -= 1;
      }
    }
    return true; /* keep processor alive */
  }
}
registerProcessor('fsk-processor', FSKProcessor);
`;

/* ════════════════════════════════════════════════════════════════════════
 * Main App
 * ════════════════════════════════════════════════════════════════════════ */
const connectBtn  = document.getElementById('connect-btn');
const statusDot   = document.getElementById('status-dot');
const statusText  = document.getElementById('status-text');
const messages    = document.getElementById('messages');
const msgInput    = document.getElementById('msg-input');
const sendBtn     = document.getElementById('send-btn');
const dbg         = document.getElementById('dbg');

let audioCtx   = null;
let fskNode    = null;
let connected  = false;

function setStatus(state, text) {
  statusDot.className = state;
  statusText.textContent = text;
}

function addMsg(cls, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function setDebug(t) { dbg.textContent = t; }

async function connect() {
  setStatus('connecting', 'Requesting microphone…');
  connectBtn.disabled = true;

  try {
    /* Must request mic BEFORE creating AudioContext on iOS */
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      }
    });

    /* Create context — iOS will force 44100 or 48000, that's fine */
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    if (audioCtx.state === 'suspended') await audioCtx.resume();

    /* Load worklet from blob URL (single-file trick) */
    const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
    const url  = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);

    /* Create FSK node */
    fskNode = new AudioWorkletNode(audioCtx, 'fsk-processor', {
      numberOfInputs: 1,
      numberOfOutputs: 1,
      outputChannelCount: [1],
    });

    /* Wire up: mic stream → FSK input, FSK output → speakers */
    const micSource = audioCtx.createMediaStreamSource(stream);
    micSource.connect(fskNode);
    fskNode.connect(audioCtx.destination);

    /* Handle decoded messages from ESP32 */
    fskNode.port.onmessage = (e) => {
      if (e.data.type === 'recv') {
        addMsg('esp32', e.data.text);
        setDebug('Received message');
      } else if (e.data.type === 'crcerr') {
        setDebug('CRC error — frame dropped');
      }
    };

    connected = true;
    setStatus('connected', 'Connected — audio channel open');
    addMsg('sys', 'Audio channel ready. Messages to/from ESP32 will appear here.');
    msgInput.disabled = false;
    sendBtn.disabled  = false;
    msgInput.focus();
    connectBtn.textContent = 'Disconnect';
    connectBtn.disabled = false;
    connectBtn.onclick = disconnect;

  } catch (err) {
    setStatus('error', 'Error: ' + err.message);
    addMsg('sys', 'Error: ' + err.message +
      '\n\nMake sure:\n1. iPhone is paired with ESP32-Modem via BT\n2. This page is loaded over HTTPS');
    connectBtn.disabled = false;
    connectBtn.textContent = 'Retry';
  }
}

function disconnect() {
  if (audioCtx) { audioCtx.close(); audioCtx = null; fskNode = null; }
  connected = false;
  setStatus('', 'Disconnected');
  msgInput.disabled = true;
  sendBtn.disabled  = true;
  connectBtn.textContent = 'Connect';
  connectBtn.onclick = connect;
}

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !connected || !fskNode) return;
  fskNode.port.postMessage({ type: 'send', text });
  addMsg('me', text);
  msgInput.value = '';
  setDebug('Sending…');
}

connectBtn.onclick = connect;
sendBtn.onclick    = sendMessage;
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

/* Warn if not HTTPS */
if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
  addMsg('sys', 'WARNING: Microphone requires HTTPS. Host this page on GitHub Pages or similar.');
}
</script>
</body>
</html>
